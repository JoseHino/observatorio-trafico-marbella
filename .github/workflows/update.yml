name: Actualizar datos DGT

on:
  schedule:
    # Día 5 de cada mes a las 06:00 UTC (la DGT publica los ficheros ~noviembre;
    # el resto de meses la ejecución simplemente no encuentra novedades).
    - cron: "0 6 5 * *"
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar y procesar datos de la DGT
        run: |
          python scripts/collect.py
          python scripts/build_excel.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs Observatorio_Trafico_Marbella_DGT.xlsx
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos DGT."
          else
            git commit -m "Actualización automática de datos DGT ($(date -u +%Y-%m-%d))"
            git push
          fi
